name: EtherGENET-6 RISC OS Build

on:
  push:
    paths:
      - 'Inet6Sources/Drivers/EtherGENET-6/**'
      - '.github/workflows/ethergenet.yaml'
  pull_request:
    paths:
      - 'Inet6Sources/Drivers/EtherGENET-6/**'
  workflow_dispatch:

jobs:
  build-32bit:
    name: Build EtherGENET-6 (AArch32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download riscos-build-online
        run: |
          curl -L -o "$GITHUB_WORKSPACE/riscos-build-online" \
            "https://github.com/gerph/robuild-client/releases/download/v0.07/riscos-build-online"
          chmod +x "$GITHUB_WORKSPACE/riscos-build-online"

      - name: Write 32-bit .robuild.yaml
        working-directory: Inet6Sources/Drivers/EtherGENET-6
        run: |
          cat > .robuild.yaml << 'EOF'
          format: 1
          jobs:
            build:
              script:
                - amu_machine standalone
          artifacts:
            - path: rm/EtherGENET
          EOF

      - name: Zip source
        working-directory: Inet6Sources/Drivers/EtherGENET-6
        run: zip -q9r /tmp/source32.zip .

      - name: Build via RISC OS build service
        run: |
          "$GITHUB_WORKSPACE/riscos-build-online" \
            -i /tmp/source32.zip \
            -A aarch32 \
            -t 120 \
            -o /tmp/EtherGENET-32 \
            2>&1 | tee "$GITHUB_WORKSPACE/build32.log"

      - name: Upload module
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: EtherGENET-aarch32
          path: |
            /tmp/EtherGENET-32*
            ${{ github.workspace }}/build32.log

  build-64bit:
    name: Build EtherGENET-6 (AArch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download riscos-build-online
        run: |
          curl -L -o "$GITHUB_WORKSPACE/riscos-build-online" \
            "https://github.com/gerph/robuild-client/releases/download/v0.07/riscos-build-online"
          chmod +x "$GITHUB_WORKSPACE/riscos-build-online"

      - name: Write 64-bit .robuild.yaml
        working-directory: Inet6Sources/Drivers/EtherGENET-6
        run: |
          cat > .robuild.yaml << 'EOF'
          format: 1
          jobs:
            build:
              script:
                - Echo ===SYSVAR===
                - Show
                - Echo ===ROOT===
                - Cat $
                - Echo ===UTILS===
                - Cat $.Utilities
                - Echo ===TOOLS===
                - Cat $.Tools
                - Echo ===APPS===
                - Cat $.Apps
                - Echo ===LOCALFILES===
                - Cat @
          artifacts:
            - path: rm/EtherGENET
          EOF

      - name: Zip source
        working-directory: Inet6Sources/Drivers/EtherGENET-6
        run: zip -q9r /tmp/source64.zip .

      - name: Build via RISC OS build service
        run: |
          "$GITHUB_WORKSPACE/riscos-build-online" \
            -i /tmp/source64.zip \
            -A aarch64 \
            -t 120 \
            -o /tmp/EtherGENET-64 \
            2>&1 | tee "$GITHUB_WORKSPACE/build64.log"

      - name: Upload module
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: EtherGENET-aarch64
          path: |
            /tmp/EtherGENET-64*
            ${{ github.workspace }}/build64.log
